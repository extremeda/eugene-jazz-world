<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Modes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e0d0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    header {
      padding: 2rem 3rem 1rem;
      border-bottom: 1px solid #2a2a2a;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      color: #c8a96e;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    .root-selector {
      padding: 1.2rem 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #1e1e1e;
    }

    .root-selector label {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #aaa;
      text-transform: uppercase;
    }

    .root-selector select {
      background: #1a1a1a;
      color: #e8e0d0;
      border: 1px solid #333;
      padding: 0.4rem 0.8rem;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 3px;
    }

    .root-selector select:focus { outline: none; border-color: #c8a96e; }

    .layout {
      display: flex;
      height: calc(100vh - 130px);
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #1e1e1e;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .group-label {
      padding: 0.5rem 1.2rem 0.3rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #777;
    }

    .mode-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.65rem 1.2rem;
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }

    .mode-btn:hover { color: #e8e0d0; background: #141414; }
    .mode-btn.active {
      color: #c8a96e;
      border-left-color: #c8a96e;
      background: #161410;
    }

    .mode-btn .degree {
      font-size: 0.7rem;
      color: #777;
      float: right;
      margin-top: 2px;
    }

    .mode-btn.active .degree { color: #8a6a3a; }

    .mode-subtitle {
      font-size: 0.62rem;
      color: #666;
      font-style: italic;
    }

    .mode-btn.active .mode-subtitle { color: #7a5a30; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 3rem;
    }

    .mode-header {
      margin-bottom: 1.5rem;
    }

    .mode-header h2 {
      font-size: 2rem;
      font-weight: normal;
      color: #c8a96e;
      letter-spacing: 0.08em;
    }

    .mode-header .parent {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    .mode-header .sound-tag {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.2rem 0.7rem;
      border: 1px solid #444;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      width: 100%;
      text-align: left;
    }
    .section-title:hover { color: #aaa; }
    .section-title .chevron {
      margin-left: auto;
      transition: transform 0.2s;
      opacity: 0.5;
    }
    .section.collapsed .chevron { transform: rotate(-90deg); }
    .section-body { overflow: hidden; }
    .section.collapsed .section-body { display: none; }

    .notes-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .note-cell {
      min-width: 48px;
      padding: 0.6rem 0.4rem;
      text-align: center;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
    }

    .note-cell .note-name {
      font-size: 1.1rem;
      color: #e8e0d0;
    }

    .note-cell.root .note-name { color: #c8a96e; font-weight: bold; }
    .note-cell.characteristic .note-name { color: #7eb8c9; }

    .note-cell .interval {
      font-size: 0.65rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .note-cell.characteristic .interval { color: #6a9aaa; }

    .interval-legend {
      margin-top: 0.7rem;
      font-size: 0.75rem;
      color: #888;
    }

    .interval-legend span { color: #7eb8c9; }

    .piano {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-top: 0.5rem;
      overflow-x: auto;
      overflow-y: hidden;
      height: 108px; /* 100px keys + 8px breathing room */
      padding-bottom: 8px;
    }

    .octave {
      position: relative;
      display: flex;
      flex-shrink: 0;
      height: 100px;
    }

    .key {
      position: relative;
      border-radius: 0 0 4px 4px;
      cursor: default;
      flex-shrink: 0;
    }

    .key.white {
      width: 28px;
      height: 100px;
      background: #f0f0f0;
      border: 1px solid #aaa;
      margin-right: -1px; /* overlap borders */
      z-index: 0;
    }

    .key.black {
      position: absolute;
      top: 0;
      width: 17px;
      height: 62px;
      background: #222;
      border: 1px solid #000;
      z-index: 1;
    }

    .key.in-scale.white { background: #e8d89a; border-color: #b89840; }
    .key.in-scale.black { background: #5a4a20; border-color: #8a6a30; }
    .key.root-key.white { background: #c8a96e; border-color: #c8a96e; }
    .key.root-key.black { background: #7a5a20; border-color: #c8a96e; }
    .key.char-key.white { background: #b8d8e8; border-color: #5a98b8; }
    .key.char-key.black { background: #1a3a50; border-color: #5a98b8; }

    .key-label {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .key.white .key-label { color: #666; }
    .key.black .key-label { color: #aaa; }
    .key.in-scale.white .key-label { color: #444; }
    .key.root-key .key-label { color: #3a2800 !important; }
    .key.char-key .key-label { color: #1a4a6a !important; }

    .chords-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.6rem;
    }

    .chord-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0.7rem 0.9rem;
    }

    .chord-card .chord-name { font-size: 1rem; color: #e8e0d0; }
    .chord-card .chord-notes { font-size: 0.72rem; color: #888; margin-top: 0.2rem; }
    .chord-card .chord-function { font-size: 0.7rem; color: #8ab87a; margin-top: 0.15rem; }

    .description {
      line-height: 1.7;
      color: #aaa;
      font-size: 0.9rem;
      max-width: 640px;
    }

    .usage-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .usage-list li {
      font-size: 0.85rem;
      color: #aaa;
      padding-left: 1rem;
      position: relative;
    }

    .usage-list li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: #666;
    }

    .examples-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .example-tag {
      padding: 0.3rem 0.8rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      font-size: 0.8rem;
      color: #aaa;
      font-style: italic;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.9rem;
      padding: 0.4rem 1rem;
      background: none;
      border: 1px solid #3a3020;
      border-radius: 20px;
      color: #c8a96e;
      font-size: 0.8rem;
      font-family: inherit;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .play-btn:hover { background: #1a1508; border-color: #c8a96e; }
    .play-btn.playing { border-color: #7eb8c9; color: #7eb8c9; }
    .play-btn.playing:hover { background: #0a1518; }

    .play-btn svg { flex-shrink: 0; }

    .key.playing { background: #5a8a9a !important; border-color: #7eb8c9 !important; transition: background 0.05s; }

    .chord-card {
      position: relative;
    }

    .chord-play-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: none;
      border: 1px solid #333;
      border-radius: 50%;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chord-play-btn:hover { color: #c8a96e; border-color: #c8a96e; background: #1a1508; }
    .chord-play-btn.playing { color: #7eb8c9; border-color: #7eb8c9; }

    /* ── Mobile-only mode row (hidden on desktop) ── */
    .mobile-mode-row { display: none; align-items: center; gap: 0.5rem; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header { padding: 0.9rem 1.1rem 0.7rem; }
      header h1 { font-size: 1.3rem; }
      header p { font-size: 0.75rem; }

      .root-selector {
        padding: 0.7rem 1rem;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .root-selector label { font-size: 0.7rem; }
      .root-selector select { font-size: 0.85rem; padding: 0.35rem 0.6rem; }

      /* Show mobile mode picker, hide desktop sidebar */
      .mobile-mode-row { display: flex; }
      .sidebar { display: none; }

      .layout {
        height: auto;
        min-height: calc(100vh - 140px);
        flex-direction: column;
      }

      .main { padding: 1rem 1rem 2rem; }

      .mode-header h2 { font-size: 1.4rem; }
      .mode-header .parent { font-size: 0.75rem; }

      .section { margin-bottom: 1.4rem; }
      .section-title { font-size: 0.65rem; }

      .notes-row { gap: 0.35rem; }
      .note-cell { min-width: 38px; padding: 0.45rem 0.3rem; }
      .note-cell .note-name { font-size: 0.9rem; }

      .chords-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.5rem; }
      .chord-card { padding: 0.6rem 0.75rem; }
      .chord-card .chord-name { font-size: 0.9rem; }

      .description { font-size: 0.82rem; }
      .usage-list li { font-size: 0.8rem; }
      .example-tag { font-size: 0.75rem; }

      .play-btn { font-size: 0.75rem; padding: 0.35rem 0.85rem; }

      /* Piano size on mobile */
      .piano { height: 83px; } /* 75px keys + 8px */
      .octave { height: 75px; } /* ~100 * (21/28) */

      /* Metronome: smaller on mobile */
      .metro-circle { width: 54px; height: 54px; }
      .metro-dot { width: 5px; height: 5px; top: 4px; }
      .metro-line { top: 9px; }
      .metro-bpm-val { font-size: 0.8rem; }
      .metro-info { font-size: 0.55rem; }
    }

    @media (max-width: 400px) {
      .root-selector { gap: 0.4rem; }
      header h1 { font-size: 1.1rem; }
    }

    /* ── Sidebar nav tabs ── */
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #1e1e1e;
      padding: 0.4rem 0;
    }
    .sidebar-nav-btn {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      width: 100%;
      padding: 0.75rem 1.2rem;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: #777;
      font-size: 0.68rem;
      font-family: inherit;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .sidebar-nav-btn:hover { color: #ccc; background: #141414; }
    .sidebar-nav-btn.active { color: #c8a96e; border-left-color: #c8a96e; background: #161410; }
    .sidebar-nav-btn svg { flex-shrink: 0; opacity: 0.75; }
    .sidebar-nav-btn.active svg { opacity: 1; }


    /* ── Active chord pill during progression playback ── */
    .prog-pill-active {
      background: #3a3020 !important;
      border-color: #c8a96e !important;
      color: #c8a96e !important;
    }

    /* ── Progression card flow ── */
    .prog-flow {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }

    .prog-arrow {
      font-size: 1.5rem;
      color: #3a3a3a;
      padding-top: 56px;
      flex-shrink: 0;
      user-select: none;
    }

    .prog-card {
      background: #141414;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 16px 14px;
      width: 164px;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.18s;
      text-align: center;
    }

    .prog-card:hover { border-color: #c8a96e; transform: translateY(-2px); }
    .prog-card.pc-active { border-color: #c8a96e; background: #1a1508; }

    .prog-card .pc-numeral {
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.12em;
      margin-bottom: 5px;
    }

    .prog-card .pc-name {
      font-size: 1.55rem;
      color: #e8e0d0;
      margin-bottom: 3px;
      line-height: 1.1;
      font-weight: normal;
    }

    .prog-card.pc-active .pc-name { color: #c8a96e; }

    .prog-card .pc-quality {
      font-size: 0.68rem;
      color: #666;
      font-style: italic;
      margin-bottom: 11px;
    }

    .prog-card .pc-notes {
      display: flex;
      justify-content: center;
      gap: 3px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .pc-note {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 3px;
      padding: 2px 5px;
      font-size: 0.72rem;
      color: #aaa;
    }

    .pc-note.is-root { border-color: #c8a96e; color: #c8a96e; }

    .prog-card .pc-role {
      display: inline-block;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .pc-role.role-rest    { background: #0d1f0d; border: 1px solid #254025; color: #6db86d; }
    .pc-role.role-tension { background: #1f0d0d; border: 1px solid #401e1e; color: #c07070; }
    .pc-role.role-buildup { background: #1a1505; border: 1px solid #3a3008; color: #b8a050; }
    .pc-role.role-neutral { background: #111820; border: 1px solid #1e3050; color: #6090c0; }

    /* piano inside prog detail */
    .prog-detail-piano {
      margin: 0.8rem 0 1rem;
    }
    .prog-detail-piano-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.5rem;
    }

    /* Piano key press animation */
    @keyframes white-press {
      0%   { background: #f0f0f0; }
      12%  { background: #e8c060; box-shadow: 0 0 8px #c8a96e88; }
      100% { background: #c8a96e; box-shadow: 0 0 4px #c8a96e44; }
    }
    @keyframes black-press {
      0%   { background: #222; }
      12%  { background: #c09030; box-shadow: 0 0 6px #c8a96e88; }
      100% { background: #b08820; box-shadow: 0 0 3px #c8a96e44; }
    }
    .cp-piano-white     { position:absolute; border-radius:0 0 3px 3px; border:1px solid #aaa; background:#f0f0f0; }
    .cp-piano-white.lit { animation: white-press 0.22s ease-out forwards; }
    .cp-piano-black     { position:absolute; border-radius:0 0 2px 2px; border:1px solid #000; background:#222; z-index:1; }
    .cp-piano-black.lit { animation: black-press 0.22s ease-out forwards; }

    /* ── Chord progression view ── */
    .cp-section { margin-bottom: 2.2rem; }
    .cp-section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c8a96e;
      margin-bottom: 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #222;
    }
    .cp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem;
    }
    .cp-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0.6rem 0.85rem;
      position: relative;
    }
    .cp-card .cp-name { font-size: 1rem; color: #e8e0d0; }
    .cp-card .cp-type { font-size: 0.68rem; color: #888; margin-top: 0.1rem; }
    .cp-card .cp-formula { font-size: 0.63rem; color: #666; margin-top: 0.1rem; font-style: italic; }
    .cp-card .cp-notes-txt { font-size: 0.63rem; color: #777; margin-top: 0.1rem; }
    .cp-card .cp-desc { font-size: 0.62rem; color: #7a9a7a; margin-top: 0.35rem; line-height: 1.4; }

    .prog-row {
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.45rem;
    }
    .prog-row .prog-name {
      font-size: 0.8rem;
      color: #c8a96e;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .prog-row .prog-chords-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.3rem;
    }
    .prog-chord-pill {
      padding: 0.18rem 0.55rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #e8e0d0;
    }
    .prog-chord-pill .pill-deg {
      font-size: 0.58rem;
      color: #666;
      margin-left: 0.2rem;
    }
    .prog-row .prog-desc {
      font-size: 0.7rem;
      color: #666;
      font-style: italic;
    }

    /* ── Metronome ── */
    .metro-wrap {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      user-select: none;
    }

    .metro-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #252525, #111 70%);
      border: 2px solid #333;
      position: relative;
      cursor: grab;
      touch-action: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .metro-circle:active { cursor: grabbing; }
    .metro-circle.running {
      border-color: #c8a96e;
      box-shadow: 0 0 10px rgba(200, 169, 110, 0.2);
    }

    /* bright dot at top edge �� rotates with the circle */
    .metro-dot {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #c8a96e;
      border-radius: 50%;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* thin line from center to dot */
    .metro-line {
      position: absolute;
      width: 1px;
      background: #5a4a28;
      top: 13px;
      bottom: 50%;
      left: 50%;
      transform: translateX(-50%);
    }

    .metro-bpm-val {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #e8e0d0;
      pointer-events: none;
      /* counter-rotate so BPM text stays upright */
    }

    .metro-info {
      font-size: 0.62rem;
      color: #777;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Jazz Modes</h1>
  <p>Scales, intervals, characteristic tones, and harmonic context</p>
</header>

<div class="root-selector">
  <label>Root</label>
  <select id="rootSelect">
    <option value="C">C</option>
    <option value="C#">C# / Db</option>
    <option value="D">D</option>
    <option value="D#">D# / Eb</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="F#">F# / Gb</option>
    <option value="G">G</option>
    <option value="G#">G# / Ab</option>
    <option value="A">A</option>
    <option value="A#">A# / Bb</option>
    <option value="B">B</option>
  </select>

  <!-- Mobile-only mode picker -->
  <div class="mobile-mode-row">
    <label>Mode</label>
    <select id="mobileModePick"></select>

const NAT = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};
// [letter, accidental semitone offset] for each chromatic root
const ROOT_PREF = {
  'C':['C',0],'C#':['C',1],'D':['D',0],'D#':['E',-1],
  'E':['E',0],'F':['F',0],'F#':['F',1],'G':['G',0],
  'G#':['A',-1],'A':['A',0],'A#':['B',-1],'B':['B',0]
};

function spelledNote(root, semitoneOffset, intervalName) {
  const [rootLetter, rootAcc] = ROOT_PREF[root];
  const degreeNum = parseInt(intervalName.replace(/[b#]/g, ''));
  const letterIdx = (LETTERS.indexOf(rootLetter) + degreeNum - 1) % 7;
  const targetLetter = LETTERS[letterIdx];
  const rootSemitone = (NAT[rootLetter] + rootAcc + 12) % 12;
  const noteSemitone = (rootSemitone + semitoneOffset) % 12;
  let diff = (noteSemitone - NAT[targetLetter] + 12) % 12;
  if (diff > 6) diff -= 12;
  return targetLetter + ['bb','b','','#','##'][diff + 2];
}

function getScaleNotes(root, intervals) {
  const ri = CHROMATIC.indexOf(root);
  return intervals.map(i => CHROMATIC[(ri + i) % 12]);
}

function getSpelledScale(root, intervals, intervalNames) {
  return intervals.map((s, i) => spelledNote(root, s, intervalNames[i]));

function getScaleNotes(root, intervals) {
  const ri = CHROMATIC.indexOf(root);
  return intervals.map(i => CHROMATIC[(ri + i) % 12]);
}

function qualityLabel(suffix) {
  const q = {
    '': 'Major', 'm': 'Minor', 'aug': 'Augmented', 'dim': 'Diminished',
    'sus2': 'Sus 2', 'sus4': 'Sus 4',
    'maj7': 'Major 7th', '7': 'Dominant 7th', 'm7': 'Minor 7th',
    'ø7': 'Half-Dim 7th', '7alt': 'Altered Dom', 'dim7': 'Diminished 7th',
    'mMaj7': 'Minor-Maj 7th', 'aug7': 'Augmented 7th', 'augMaj7': 'Aug Maj 7th',
    '7sus4': 'Dom 7sus4', '7sus2': 'Dom 7sus2', '7b5': 'Dom 7♭5',
    'maj9': 'Major 9th', '9': 'Dominant 9th', 'm9': 'Minor 9th',
    'mMaj9': 'Min-Maj 9th', 'add9': 'Add 9', 'm(add9)': 'Min Add9',
    '7b9': 'Dom 7♭9', '7#9': 'Dom 7♯9', '9sus4': 'Dom 9sus4',
    '9#11': 'Lyd Dominant', 'maj9#11': 'Lydian Maj9',
    'm11': 'Minor 11th', '11': 'Dominant 11th',
    'maj13': 'Major 13th', '13': 'Dominant 13th', 'm13': 'Minor 13th',
    '13b9': '13 ♭9', '13#9': '13 ♯9', '13#11': '13 ♯11',
  };
  return q[suffix] !== undefined ? q[suffix] : (suffix || 'Major');
}

function roleFor(semitone) {
  const roles = {
    0:  { label: 'Tonic',       color: 'rest'    },
    1:  { label: 'Chromatic',   color: 'tension' },
    2:  { label: 'Supertonic',  color: 'buildup' },
    3:  { label: 'Mediant',     color: 'neutral' },
    4:  { label: 'Mediant',     color: 'neutral' },
    5:  { label: 'Subdominant', color: 'buildup' },
    6:  { label: 'Tritone',     color: 'tension' },
    7:  { label: 'Dominant',    color: 'tension' },
    8:  { label: 'Submediant',  color: 'neutral' },
    9:  { label: 'Submediant',  color: 'neutral' },
    10: { label: 'Subtonic',    color: 'buildup' },
    11: { label: 'Leading',     color: 'tension' },
  };
  return roles[semitone] || { label: 'Chord', color: 'neutral' };
}

// small inline piano for a chord (1 octave + C D E, lights up chord notes)
const CP_PIANO_WHITE = ['C','D','E','F','G','A','B'];
const CP_PIANO_BLACK = [
  {note:'C#',left:16},{note:'D#',left:43},
  {note:'F#',left:99},{note:'G#',left:126},{note:'A#',left:153}
];
// 3 extra high keys (next octave: C D E + their sharps)
const CP_EXTRA_WHITE = ['C','D','E'];
const CP_EXTRA_BLACK = [{note:'C#',left:16},{note:'D#',left:43}];
const CP_KW = 22, CP_KH = 76;

// Build the piano DOM; keys start unlit. Returns the outer wrapper.
// The inner container is wrapper._pianoContainer for updatePianoLit.
function buildChordPiano(noteNames) {
  const totalWhite = CP_PIANO_WHITE.length + CP_EXTRA_WHITE.length; // 10
  const container = document.createElement('div');
  container.style.cssText = `display:inline-block;position:relative;height:${CP_KH}px;overflow:hidden;width:${CP_KW * totalWhite}px;`;

  // Main octave white keys
  CP_PIANO_WHITE.forEach((n, wi) => {
    const key = document.createElement('div');
    key.className = 'cp-piano-white';
    key.dataset.note = n;
    key.style.cssText = `left:${wi * CP_KW}px;top:0;width:${CP_KW - 1}px;height:${CP_KH}px;`;
    container.appendChild(key);
  });
  // Main octave black keys
  CP_PIANO_BLACK.forEach(({note, left}) => {
    const key = document.createElement('div');
    key.className = 'cp-piano-black';
    key.dataset.note = note;
    key.style.cssText = `left:${left}px;top:0;width:14px;height:48px;`;
    container.appendChild(key);
  });

  // Extra 3 white keys (C D E of next octave)
  const extraOff = CP_PIANO_WHITE.length * CP_KW;
  CP_EXTRA_WHITE.forEach((n, wi) => {
    const key = document.createElement('div');
    key.className = 'cp-piano-white cp-piano-extra';
    key.dataset.note = n;
    key.style.cssText = `left:${extraOff + wi * CP_KW}px;top:0;width:${CP_KW - 1}px;height:${CP_KH}px;`;
    container.appendChild(key);
  });
  // Extra black keys (C# D# of next octave)
  CP_EXTRA_BLACK.forEach(({note, left}) => {
    const key = document.createElement('div');
    key.className = 'cp-piano-black cp-piano-extra';
    key.dataset.note = note;
    key.style.cssText = `left:${extraOff + left}px;top:0;width:14px;height:48px;`;
    container.appendChild(key);
  });

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'overflow-x:auto;overflow-y:hidden;padding-bottom:4px;height:88px;';
  wrapper.appendChild(container);
  wrapper._pianoContainer = container;

  // Light up initial notes if provided
  if (noteNames && noteNames.length) updatePianoLit(wrapper, noteNames);
  return wrapper;
}

// Update lit keys on an existing piano wrapper.
// noteNames: array of note name strings to light up.
// strumDelays (optional): [{note, delay}] for staggered animation.
// Pass empty noteNames to clear all lit keys.
function updatePianoLit(wrapper, noteNames, strumDelays) {
  const container = wrapper._pianoContainer;
  if (!container) return;
  const delayMap = {};
  if (strumDelays) strumDelays.forEach(({note, delay}) => { delayMap[note] = delay; });
  container.querySelectorAll('.cp-piano-white:not(.cp-piano-extra), .cp-piano-black:not(.cp-piano-extra)').forEach(key => {
    const n = key.dataset.note;
    const isLit = noteNames.includes(n);
    if (isLit) {
      const d = delayMap[n] !== undefined ? delayMap[n] : 0;
      // Force animation restart: remove class, reflow, re-add
      key.classList.remove('lit');
      key.style.animationDelay = d + 's';
      void key.offsetWidth; // trigger reflow
      key.classList.add('lit');
    } else {
      key.classList.remove('lit');
      key.style.animationDelay = '';
      key.style.animation = 'none';
      void key.offsetWidth;
      key.style.animation = '';
    }
  });
}

      const strum = 0.04;
      cardEls.forEach(({ card, notes, chordRi, semitones }) => {
        card.onclick = () => {
          cardEls.forEach(c => c.card.classList.remove('pc-active'));
          card.classList.add('pc-active');
          // Animate keys with strum delays (low→high order)
          const sortedNotes = semitones.map(s => CHROMATIC[(chordRi + s) % 12]);
          const delays = sortedNotes.map((n, i) => ({ note: n, delay: i * strum }));
          updatePianoLit(pianoEl, notes, delays);
          playChord(chordRi, semitones, { classList: { add: ()=>{}, remove: ()=>{} } });
        };
      });

      // Set first card active by default
      if (cardEls.length) cardEls[0].card.classList.add('pc-active');

      // play progression button — voice-lead piano update with strum animation
      pBtn.onclick = () => playProgression(ri, prog.chords, pBtn, pillEls, (stepIdx, absPitches) => {

        cardEls.forEach(c => c.card.classList.remove('pc-active'));
        if (cardEls[stepIdx]) cardEls[stepIdx].card.classList.add('pc-active');
        // Animate keys with strum delays matching voice-led order (low→high)
        const noteNames = absPitches.map(abs => CHROMATIC[abs % 12]);
        const delays = noteNames.map((n, i) => ({ note: n, delay: i * strum }));
        updatePianoLit(pianoEl, noteNames, delays);
      });

      // ── Summary ──
      const descEl = document.createElement('div');
      descEl.style.cssText = 'font-size:0.72rem;color:#666;font-style:italic;margin-bottom:0.3rem;';

      const summaryEl = document.createElement('div');
      summaryEl.style.cssText = 'font-size:0.8rem;color:#999;line-height:1.65;max-width:640px;';
      summaryEl.textContent = prog.summary;
      block.appendChild(summaryEl);

      section.appendChild(block);
    });

    main.appendChild(section);
  });
}

function renderPiano(scaleNotes, root, charIndices) {
  const mobile = window.innerWidth <= 768;
  // Scale key dimensions for mobile
  const W      = mobile ? 21 : 28;
  const sc     = W / 28; // scale factor for black key positions
  const WHITE_NOTES = ['C','D','E','F','G','A','B'];
  const BLACK_KEYS  = [
    { note: 'C#', left: Math.round(19 * sc) }, { note: 'D#', left: Math.round(47 * sc) },
    { note: 'F#', left: Math.round(103 * sc) }, { note: 'G#', left: Math.round(131 * sc) },
    { note: 'A#', left: Math.round(159 * sc) },
  ];

  const charNotes = charIndices.map(ci => scaleNotes[ci]);

  function makeKey(n, type, oct) {
    const key = document.createElement('div');
    key.className = `key ${type}`;
    key.dataset.note = n;
    key.dataset.octave = String(oct);
    if (mobile) {
      if (type === 'white') { key.style.width = `${W}px`; key.style.height = `${Math.round(100 * sc)}px`; }
      else                  { key.style.width = `${Math.round(17 * sc)}px`; key.style.height = `${Math.round(62 * sc)}px`; }
    }
    const inScale = scaleNotes.includes(n);
    const isRoot  = n === root;
    const isChar  = charNotes.includes(n) && !isRoot;
    if      (isRoot)   key.classList.add('root-key');
    else if (isChar)   key.classList.add('char-key');
    else if (inScale)  key.classList.add('in-scale');
    if (inScale || isRoot) {
      const label = document.createElement('div');
      label.className = 'key-label';
      label.textContent = n;
      key.appendChild(label);
    }
    return key;
  }

  const piano = document.createElement('div');
  piano.className = 'piano';

  [4, 5].forEach(oct => {
    const octEl = document.createElement('div');
    octEl.className = 'octave';
    WHITE_NOTES.forEach(n => octEl.appendChild(makeKey(n, 'white', oct)));
    BLACK_KEYS.forEach(({ note: n, left }) => {
      const key = makeKey(n, 'black', oct);
      key.style.left = `${left}px`;
      octEl.appendChild(key);
    });
    piano.appendChild(octEl);
  });

  return piano;
}

  legend.className = 'interval-legend';
  const charSpelled = m.characteristic.map(i => spelledScale[i]);
  legend.innerHTML = `Root: <b style="color:#c8a96e">${spelledScale[0]}</b> &nbsp;·&nbsp; Characteristic tone: <span>${charSpelled.join(', ')}</span>`;
  notesBody.appendChild(legend);
  main.appendChild(notesSection);

  // Piano
  const { section: pianoSection, body: pianoBody } = makeSection('Keyboard');
  const pianoEl = renderPiano(scaleNotes, root, m.characteristic);
  pianoBody.appendChild(pianoEl);
  main.appendChild(pianoSection);

  // Wire play button now that pianoEl exists
  playBtn.onclick = () => playScale(scaleNotes, playBtn, pianoEl);

  // Chords
  const rootSemitone = CHROMATIC.indexOf(root);
  const { section: chordSection, body: chordBody } = makeSection('Common Chords');
  const chordsGrid = document.createElement('div');
  chordsGrid.className = 'chords-grid';

  m.chords.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'chord-card';
    const chordRoot = ch.name.match(/^[A-G]#?/)[0];
    const diff = (rootSemitone - CHROMATIC.indexOf('C') + 12) % 12;
    const newChordRoot = CHROMATIC[(CHROMATIC.indexOf(chordRoot) + diff) % 12];
    const newChordName = ch.name.replace(/^[A-G]#?/, newChordRoot);

    const nameEl = document.createElement('div');
    nameEl.className = 'chord-name';
    nameEl.textContent = newChordName;

    const notesEl = document.createElement('div');
    notesEl.className = 'chord-notes';
    notesEl.textContent = ch.notes;

    const fnEl = document.createElement('div');
    fnEl.className = 'chord-function';
    fnEl.textContent = ch.fn;

    const cPlayBtn = document.createElement('button');
    cPlayBtn.className = 'chord-play-btn';
    cPlayBtn.innerHTML = playIcon();
    cPlayBtn.title = 'Play chord';
    cPlayBtn.onclick = (e) => { e.stopPropagation(); playChord(rootSemitone, ch.semitones, cPlayBtn); };

    card.appendChild(nameEl);
    card.appendChild(notesEl);
    card.appendChild(fnEl);
    card.appendChild(cPlayBtn);
    chordsGrid.appendChild(card);
  });
  chordBody.appendChild(chordsGrid);
  main.appendChild(chordSection);

  // Description
  const { section: descSection, body: descBody } = makeSection('Character');
  const descP = document.createElement('p');
  descP.className = 'description';
  descP.textContent = m.description;
  descBody.appendChild(descP);
  main.appendChild(descSection);

  // Usage
  const { section: usageSection, body: usageBody } = makeSection('Use Over');
  const ul = document.createElement('ul');
  ul.className = 'usage-list';
  m.usage.forEach(u => { const li = document.createElement('li'); li.textContent = u; ul.appendChild(li); });
  usageBody.appendChild(ul);
  main.appendChild(usageSection);

  // Examples
  const { section: exSection, body: exBody } = makeSection('Heard In');
  const exRow = document.createElement('div');
  exRow.className = 'examples-row';
  m.examples.forEach(e => {
    const tag = document.createElement('div');
    tag.className = 'example-tag';
    tag.textContent = e;
    exRow.appendChild(tag);
  });
  exBody.appendChild(exRow);
  main.appendChild(exSection);
}

document.getElementById('rootSelect').addEventListener('change', e => {
  const val = e.target.value;
  if (val.includes('/')) {
    currentRoot = val.split('/')[0].trim().replace(' ', '');
  } else {
    currentRoot = val.trim();
  }
  if (currentView === 'chords') renderChordProgressionView();
  else if (currentView === 'chordtypes') renderChordTypesView();
  else renderMain();
});

// ── Audio engine ────────────────────────────────────────────────────────────
// Note frequencies (octave 4, semitone offset from C4 = 261.63 Hz)
const NOTE_FREQ = {};
CHROMATIC.forEach((n, i) => { NOTE_FREQ[n] = 261.63 * Math.pow(2, i / 12); });

let audioCtx = null;
let playbackStop   = null; // function to cancel in-progress scale playback
let chordStop      = null; // function to cancel in-progress chord playback
let progStop       = null; // function to cancel in-progress progression playback

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(ctx, freq, startTime, duration) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, startTime);

  // Piano-like envelope: fast attack, short decay, low sustain, release
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.35, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.12, startTime + 0.08);
  gain.gain.setValueAtTime(0.12, startTime + duration - 0.05);
  gain.gain.linearRampToValueAtTime(0.0001, startTime + duration + 0.1);

  osc.start(startTime);
  osc.stop(startTime + duration + 0.15);
}


function playScale(scaleNotes, btn, pianoEl) {
  if (playbackStop) { playbackStop(); return; }

  const ctx = getAudioCtx();
  // Each scale note = one quarter note at the current BPM
  const gap          = 60 / metroBpm;
  const noteDuration = gap * 0.82;
  // Build ascending + descending sequence with octave tags
  // Ascending: notes[0..n-1] octave 4, notes[n] octave 5 (high root)
  // Descending: notes[n-1..0] octave 4, returning to root octave 4
  const rootIdx = CHROMATIC.indexOf(scaleNotes[0]);
  const allNotesWithOct = [];
  scaleNotes.forEach((note, i) => {
    const ni = CHROMATIC.indexOf(note);
    const oct = ni < rootIdx ? 5 : 4;
    allNotesWithOct.push({ note, oct });
  });
  // high root at top of ascent
  allNotesWithOct.push({ note: scaleNotes[0], oct: 5 });
  // descend: same notes reversed (skip the high root we just added, add low root at end)
  for (let i = scaleNotes.length - 1; i >= 1; i--) {
    const note = scaleNotes[i];
    const ni = CHROMATIC.indexOf(note);
    const oct = ni < rootIdx ? 5 : 4;
    allNotesWithOct.push({ note, oct });
  }
  allNotesWithOct.push({ note: scaleNotes[0], oct: 4 });

  const now = ctx.currentTime + 0.05;

  // Pause standalone metronome while scale plays; restart after
  const wasRunning = metroRunning;
  if (wasRunning) {
    clearTimeout(metroTimeout);
    metroRunning = false;
  }

  // Highlight piano keys in sync — keyed by "NOTE-octave"
  const keyEls = pianoEl ? pianoEl.querySelectorAll('.key') : [];
  const keyMap = {};
  keyEls.forEach(el => {
    const n = el.dataset.note, o = el.dataset.octave;
    if (n && o) keyMap[`${n}-${o}`] = el;
  });

  // Master gain for all scale notes — set to 0 on stop for instant silence
  const scaleGain = ctx.createGain();
  scaleGain.gain.setValueAtTime(1, now);
  scaleGain.connect(ctx.destination);

  function scheduleNote(freq, startTime, duration) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(scaleGain);          // through master, not directly to destination
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.35, startTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.12, startTime + 0.08);
    gain.gain.setValueAtTime(0.12, startTime + duration - 0.05);
    gain.gain.linearRampToValueAtTime(0.0001, startTime + duration + 0.1);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.15);
  }

  const timeouts = [];
  allNotesWithOct.forEach(({ note, oct }, i) => {
    let freq = NOTE_FREQ[note];
    if (oct === 5) freq *= 2;
    scheduleNote(freq, now + i * gap, noteDuration);

    const mapKey = `${note}-${oct}`;

    const t1 = setTimeout(() => {
      Object.values(keyMap).forEach(k => k.classList.remove('playing'));
      const k = keyMap[mapKey];
      if (k) k.classList.add('playing');
      btn.classList.add('playing');
      btn.innerHTML = stopIcon() + 'Stop';
    }, (now + i * gap - ctx.currentTime) * 1000);

    const t2 = setTimeout(() => {
      const k = keyMap[mapKey];
      if (k) k.classList.remove('playing');
    }, (now + i * gap + noteDuration - ctx.currentTime) * 1000);

    timeouts.push(t1, t2);
  });

  const cleanup = (resume) => {
    keyEls.forEach(k => k.classList.remove('playing'));
    btn.classList.remove('playing');
    btn.innerHTML = playIcon() + 'Play scale';
    playbackStop = null;
    if (resume && wasRunning) {
      metroRunning = true;
      metroTick();
    }
  };

  // Done
  const totalMs = (now + allNotesWithOct.length * gap - ctx.currentTime) * 1000;
  const tDone = setTimeout(() => cleanup(true), totalMs);
  timeouts.push(tDone);

  playbackStop = () => {
    timeouts.forEach(clearTimeout);
    scaleGain.gain.setValueAtTime(0, ctx.currentTime); // silence immediately
    cleanup(false);
  };
}

function playChord(rootSemitone, semitones, btn) {
  // Stop whatever chord is currently playing (same or different)
  if (chordStop) {
    const wasSameBtn = chordStop.btn === btn;
    chordStop();
    if (wasSameBtn) return; // toggle off
  }

  const ctx = getAudioCtx();
  const baseFreq = 261.63 * Math.pow(2, rootSemitone / 12);
  const now      = ctx.currentTime + 0.05;
  const strum    = 0.04;
  const duration = 1.6;

  const chordGain = ctx.createGain();
  chordGain.gain.setValueAtTime(1, now);
  chordGain.connect(ctx.destination);

  semitones.forEach((s, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(chordGain);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(baseFreq * Math.pow(2, s / 12), now + i * strum);
    gain.gain.setValueAtTime(0, now + i * strum);
    gain.gain.linearRampToValueAtTime(0.35, now + i * strum + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.12, now + i * strum + 0.08);
    gain.gain.setValueAtTime(0.12, now + i * strum + duration - 0.05);
    gain.gain.linearRampToValueAtTime(0.0001, now + i * strum + duration + 0.1);
    osc.start(now + i * strum);
    osc.stop(now + i * strum + duration + 0.15);
  });

  btn.classList.add('playing');

  const stopTimer = setTimeout(() => {
    btn.classList.remove('playing');
    chordStop = null;
  }, (duration + semitones.length * strum + 0.2) * 1000);

  chordStop = () => {
    clearTimeout(stopTimer);
    chordGain.gain.setValueAtTime(0, ctx.currentTime);
    btn.classList.remove('playing');
    chordStop = null;
  };
  chordStop.btn = btn;
}

// Build a close-position voicing as absolute MIDI-style pitches (middle C = 48).
// pcs: array of pitch classes (0-11). baseOct: starting octave (4 = middle).
function buildCloseVoicing(pcs, baseOct) {
  const unique = [...new Set(pcs)].sort((a, b) => a - b);
  const result = [];
  let prev = -1;
  unique.forEach(pc => {
    let abs = pc + baseOct * 12;
    while (abs <= prev) abs += 12;
    result.push(abs);
    prev = abs;
  });
  return result;
}

// Voice lead from prevVoicing (absolute pitches) to nextPCs (pitch classes).
// Each pitch class gets placed at the absolute pitch closest to the centroid.
function voiceLead(prevVoicing, nextPCs) {
  const centroid = prevVoicing.reduce((a, b) => a + b, 0) / prevVoicing.length;
  const result = nextPCs.map(pc => {
    let abs = pc % 12;
    // Start from a low base and walk up to the candidate nearest centroid
    abs += 12 * Math.round((centroid - abs) / 12);
    // Fine-tune: step by semitone to the nearest option within ±6
    if (abs < centroid - 6) abs += 12;
    if (abs > centroid + 6) abs -= 12;
    return abs;
  });
  result.sort((a, b) => a - b);
  return result;
}

function playProgression(ri, chords, btn, pillEls, onStep) {
  if (progStop) {
    const wasSame = progStop.btn === btn;
    progStop();
    if (wasSame) return;
  }

  const ctx = getAudioCtx();
  const chordDur = (60 / metroBpm) * 2; // 2 beats per chord
  const strum    = 0.04;
  const now      = ctx.currentTime + 0.05;

  // Build voice-led voicings for every chord in the progression
  const voicings = [];
  chords.forEach((ch, i) => {
    const chordRi = (ri + ch.semitone) % 12;
    // Absolute pitch classes for this chord (shifted by root)
    const pcs = ch.semitones.map(s => (chordRi + s) % 12);
    if (i === 0) {
      voicings.push(buildCloseVoicing(pcs, 4));
    } else {
      voicings.push(voiceLead(voicings[i - 1], pcs));
    }
  });

  const masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(1, now);
  masterGain.connect(ctx.destination);

  // C4 = MIDI 48; freq = 261.63 * 2^((abs-48)/12)
  function scheduleVoicing(absPitches, startTime) {
    absPitches.forEach((abs, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(masterGain);
      osc.type = 'triangle';
      const freq = 261.63 * Math.pow(2, (abs - 48) / 12);
      const t = startTime + i * strum;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3,   t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.1, t + 0.08);
      gain.gain.setValueAtTime(0.1, t + chordDur - 0.06);
      gain.gain.linearRampToValueAtTime(0.0001, t + chordDur + 0.08);
      osc.start(t);
      osc.stop(t + chordDur + 0.12);
    });
  }

  voicings.forEach((absPitches, i) => {
    scheduleVoicing(absPitches, now + i * chordDur);
  });

  const timeouts = [];

  chords.forEach((_, i) => {
    const t = setTimeout(() => {
      pillEls.forEach(p => p.classList.remove('prog-pill-active'));
      if (pillEls[i]) pillEls[i].classList.add('prog-pill-active');
      btn.classList.add('playing');
      btn.innerHTML = stopIcon() + ' Stop';
      if (onStep) onStep(i, voicings[i]);
    }, (now + i * chordDur - ctx.currentTime) * 1000);
    timeouts.push(t);
  });

  const tDone = setTimeout(() => {
    pillEls.forEach(p => p.classList.remove('prog-pill-active'));
    btn.classList.remove('playing');
    btn.innerHTML = playIcon() + ' Play';
    progStop = null;
  }, (now + chords.length * chordDur - ctx.currentTime) * 1000);
  timeouts.push(tDone);

  progStop = () => {
    timeouts.forEach(clearTimeout);
    masterGain.gain.setValueAtTime(0, ctx.currentTime);
    pillEls.forEach(p => p.classList.remove('prog-pill-active'));
    btn.classList.remove('playing');
    btn.innerHTML = playIcon() + ' Play';
    progStop = null;
  };
  progStop.btn = btn;
}

function playIcon() {
  return `<svg width="9" height="11" viewBox="0 0 10 12" fill="currentColor"><polygon points="0,0 10,6 0,12"/></svg>`;
}
function stopIcon() {
  return `<svg width="9" height="11" viewBox="0 0 10 12" fill="currentColor"><rect x="0" y="0" width="4" height="12"/><rect x="6" y="0" width="4" height="12"/></svg>`;
}
// ────────────────────────────────────────────────────────────────────────────

// ── Metronome ────────────────────────────────────────────────────────────────
let metroBpm       = 80;
let metroRunning   = false;
let metroTimeout   = null;
let metroAnimFrame = null;
let metroRotation  = 0;
let metroLastTs    = null;

// Drag state
let metroDragActive     = false;
let metroDragLastAngle  = null;
let metroDragAccum      = 0;
let metroDragStartBpm   = 80;

const metroCircleEl = document.getElementById('metro-circle');
const metroBpmValEl = document.getElementById('metro-bpm-val');
const metroInfoEl   = document.getElementById('metro-info');

function metroGetAngle(x, y) {
  const r = metroCircleEl.getBoundingClientRect();
  return Math.atan2(y - (r.top + r.height / 2), x - (r.left + r.width / 2)) * 180 / Math.PI;
}

function metroSetBpm(bpm) {
  metroBpm = Math.max(30, Math.min(200, Math.round(bpm)));
  metroBpmValEl.textContent = metroBpm;
  metroInfoEl.textContent = `♩ = ${metroBpm} · ${metroRunning ? 'click to stop' : 'click to start'}`;
}

function metroTick() {
  if (!metroRunning) return;
  metroTimeout = setTimeout(metroTick, 60000 / metroBpm);
}

function metroAnimate(ts) {
  if (metroLastTs !== null) {
    const dt = ts - metroLastTs;
    metroRotation += dt * (360 * metroBpm / 60000);
    // rotate the whole circle; counter-rotate the BPM label so it stays readable
    metroCircleEl.style.transform = `rotate(${metroRotation}deg)`;
    metroBpmValEl.style.transform  = `rotate(${-metroRotation}deg)`;
  }
  metroLastTs = ts;
  metroAnimFrame = requestAnimationFrame(metroAnimate);
}

function metroStart() {
  metroRunning = true;
  metroLastTs  = null;
  metroTick();
  metroAnimFrame = requestAnimationFrame(metroAnimate);
  metroCircleEl.classList.add('running');
  metroInfoEl.textContent = `♩ = ${metroBpm} · click to stop`;
}

function metroStop() {
  metroRunning = false;
  clearTimeout(metroTimeout);
  cancelAnimationFrame(metroAnimFrame);
  metroCircleEl.classList.remove('running');
  metroInfoEl.textContent = `♩ = ${metroBpm} · click to start`;
}

// Pointer drag — spin to change BPM
metroCircleEl.addEventListener('pointerdown', e => {
  metroDragActive    = true;
  metroDragLastAngle = metroGetAngle(e.clientX, e.clientY);
  metroDragAccum     = 0;
  metroDragStartBpm  = metroBpm;
  metroCircleEl.setPointerCapture(e.pointerId);
  e.preventDefault();
});

metroCircleEl.addEventListener('pointermove', e => {
  if (!metroDragActive) return;
  const angle = metroGetAngle(e.clientX, e.clientY);
  let delta = angle - metroDragLastAngle;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  metroDragAccum    += delta;
  metroDragLastAngle = angle;
  // 2 degrees per BPM — full circle ≈ 180 BPM range
  metroSetBpm(metroDragStartBpm + metroDragAccum / 2);
  // Also visually spin the circle with the drag when stopped
  if (!metroRunning) {
    metroRotation += delta;
    metroCircleEl.style.transform = `rotate(${metroRotation}deg)`;
    metroBpmValEl.style.transform  = `rotate(${-metroRotation}deg)`;
  }
});

metroCircleEl.addEventListener('pointerup', () => {
  const wasDrag = Math.abs(metroDragAccum) > 4;
  metroDragActive = false;
  if (!wasDrag) {
    // treat as click — toggle start/stop
    metroRunning ? metroStop() : metroStart();
  }
});
// ─────────────────────────────────────────────────────────────────────────────

renderSidebar();
renderMain();
</script>
